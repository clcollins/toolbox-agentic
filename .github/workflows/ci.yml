name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CONTAINER_SUBSYS: podman
  CI_IMAGE: toolbox-agentic-ci

jobs:
  ci-build:
    name: Build CI Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build CI container image
        run: podman build -f test/Containerfile.ci -t ${{ env.CI_IMAGE }} .
      - name: Save CI image
        run: podman save ${{ env.CI_IMAGE }} -o /tmp/ci-image.tar
      - name: Upload CI image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-image
          path: /tmp/ci-image.tar
          retention-days: 1

  lint-python:
    name: Lint Python
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Lint Python
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint-python

  lint-shell:
    name: Lint Shell
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Lint Shell
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint-shell

  lint-container:
    name: Lint Containerfiles
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Lint Containerfiles
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint-container

  lint-json:
    name: Validate JSON
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Validate JSON
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint-json

  lint-yaml:
    name: Lint YAML
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Lint YAML
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint-yaml

  validate-containerfile:
    name: Containerfile Validation
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Validate Containerfile tags
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make validate-containerfile

  test-python:
    name: Python Tests
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run unit tests
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make test-python

  test-integration:
    name: Integration Tests
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run integration tests
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make test-integration

  test-shell:
    name: Shell Tests
    needs: [lint-shell]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run bats tests
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make test-shell

  test-security:
    name: Security Contract Tests
    needs: [lint-json, lint-yaml]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run security tests
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make test-security

  docs-check:
    name: Documentation Check
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Check plan documents
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make docs-check

  image-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: [test-python, test-shell, test-security]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build agent-runner image
        run: make image-build CONTAINER_SUBSYS=podman
      - name: Build egress-proxy image
        run: make image-build-proxy CONTAINER_SUBSYS=podman
      - name: Verify agent-runner image
        run: |
          podman inspect localhost/agent-runner:go --format '{{.Config.User}}' | grep -q 1001
          podman inspect localhost/agent-runner:go --format '{{join .Config.Env "\n"}}' | grep -q GOTOOLCHAIN=auto
          podman inspect localhost/agent-runner:go --format '{{join .Config.Env "\n"}}' | grep -q DISABLE_AUTOUPDATER=1
      - name: Verify egress-proxy image
        run: |
          podman inspect localhost/agent-egress-proxy:latest --format '{{.Config.User}}' | grep -q 1001

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [image-build]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build images for scanning
        run: make image-build-all CONTAINER_SUBSYS=podman
      - name: Save images as tarballs for Trivy
        run: |
          podman save localhost/agent-runner:go -o /tmp/agent-runner.tar
          podman save localhost/agent-egress-proxy:latest -o /tmp/egress-proxy.tar
      - name: Scan agent-runner
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          input: /tmp/agent-runner.tar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Scan egress-proxy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          input: /tmp/egress-proxy.tar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
