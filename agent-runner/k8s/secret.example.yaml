apiVersion: v1
kind: Secret
metadata:
  name: agent-tokens-EXAMPLE
  namespace: agents
type: Opaque
stringData:
  # Claude auth — use ONE of: ANTHROPIC_API_KEY or the VERTEX block below.

  # Option A: Direct API key
  # ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"

  # Option B: Vertex AI (requires ADC credentials mounted separately)
  CLAUDE_CODE_USE_VERTEX: "1"
  ANTHROPIC_VERTEX_PROJECT_ID: "REPLACE_WITH_GCP_PROJECT"
  VERTEXAI_PROJECT: "REPLACE_WITH_GCP_PROJECT"
  VERTEXAI_LOCATION: "global"
  CLOUD_ML_REGION: "global"

  # Git auth (for push/PR/MR)
  GH_TOKEN: "REPLACE_WITH_GITHUB_FINE_GRAINED_PAT"
  GITLAB_TOKEN: "REPLACE_WITH_GITLAB_TOKEN"
