apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-injected-config
  namespace: agents
data:
  # Each key becomes a filename when mounted as a volume.
  # Mount this ConfigMap at /home/agent/.injected-config/ in job.yaml.
  run.sh: |
    #!/bin/bash
    echo "Hello from injected script"
  custom-config.yaml: |
    key: value
