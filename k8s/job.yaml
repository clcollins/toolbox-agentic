apiVersion: batch/v1
kind: Job
metadata:
  name: agent-run-EXAMPLE
  namespace: agents
  labels:
    app: claude-agent-runner
spec:
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: claude-agent-runner
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      # runtimeClassName: gvisor   # uncomment for separate-kernel isolation (gVisor)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: localhost/agent-runner:go
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: agent-tokens-EXAMPLE
          env:
            - name: AGENT_REPOS
              value: "github.com/your-org/your-repo"
            - name: AGENT_TASK
              value: "Summarize the repo and propose next steps."
            - name: AGENT_MODE
              value: "online"
            - name: GOPRIVATE
              value: "github.com/your-org/*"
            # Vertex AI auth (alternative to ANTHROPIC_API_KEY in the Secret)
            - name: CLAUDE_CODE_USE_VERTEX
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: CLAUDE_CODE_USE_VERTEX
                  optional: true
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: ANTHROPIC_VERTEX_PROJECT_ID
                  optional: true
            - name: VERTEXAI_PROJECT
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: VERTEXAI_PROJECT
                  optional: true
            - name: VERTEXAI_LOCATION
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: VERTEXAI_LOCATION
                  optional: true
            - name: CLOUD_ML_REGION
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: CLOUD_ML_REGION
                  optional: true
            - name: GOOGLE_APPLICATION_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: agent-tokens-EXAMPLE
                  key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                  optional: true
            # Proxy
            - name: HTTPS_PROXY
              value: "http://agent-egress-proxy.agents.svc:8080"
            - name: HTTP_PROXY
              value: "http://agent-egress-proxy.agents.svc:8080"
            - name: NO_PROXY
              value: "localhost,127.0.0.1"
            # --- Behavior (uncomment as needed) ---
            # - name: GIT_AUTHOR_NAME
            #   value: "agent-bot"
            # - name: GIT_AUTHOR_EMAIL
            #   value: "agent-bot@localhost"
            # - name: GITLAB_HOST
            #   value: "gitlab.com"
            # - name: AGENT_TASK_FILE
            #   value: "/home/agent/.injected/task.md"
            # - name: AGENT_WARM_TOOLCHAINS
            #   value: "1"
            # - name: AGENT_WARM_MODCACHE
            #   value: "1"
            # - name: AGENT_GO_WORK
            #   value: "1"
            # - name: AGENT_INTERACTIVE
            #   value: "1"
            # - name: AGENT_CACHE_ONLY
            #   value: "1"
            # - name: AGENT_GOCACHE_SRC
            #   value: "/opt/go-cache"
            # --- Injected files (list container paths for entrypoint logging) ---
            # - name: AGENT_INJECTED_FILES
            #   value: "/home/agent/.injected/run.sh,/home/agent/.ssh/id_ed25519"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              ephemeral-storage: 16Gi
            limits:
              cpu: "4"
              memory: 8Gi
              ephemeral-storage: 16Gi
          volumeMounts:
            - name: home
              mountPath: /home/agent
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            # Vertex AI: mount ADC credentials (uncomment for Vertex auth)
            # - name: gcloud-adc
            #   mountPath: /home/agent/.config/gcloud
            #   readOnly: true
            # File injection: mount Secret or ConfigMap files into the container
            # - name: injected-secrets
            #   mountPath: /home/agent/.injected
            #   readOnly: true
            # - name: injected-config
            #   mountPath: /home/agent/.injected-config
            #   readOnly: true
      volumes:
        - name: home
          emptyDir:
            sizeLimit: 6Gi
        - name: workspace
          emptyDir:
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        # Vertex AI: ADC credentials Secret (uncomment for Vertex auth)
        # - name: gcloud-adc
        #   secret:
        #     secretName: agent-gcloud-adc
        # File injection: mount Secrets (sensitive files) or ConfigMaps (scripts, configs)
        # - name: injected-secrets
        #   secret:
        #     secretName: agent-injected-files
        # - name: injected-config
        #   configMap:
        #     name: agent-injected-config
